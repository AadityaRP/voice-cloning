<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instant Voice Clone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v=3">
</head>

<body>
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div class="bg-shape shape-3"></div>

  <main class="container">
    <header class="app-header">
      <div class="logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
          <line x1="12" x2="12" y1="19" y2="22" />
        </svg>
      </div>
      <div>
        <h1>Instant Voice Clone</h1>
        <p class="subtitle">Record, clone, and generate speech with AI</p>
      </div>
    </header>

    <div class="content-grid">
      <!-- Step 1 Card -->
      <section class="card">
        <div class="card-header">
          <span class="step-badge">1</span>
          <h2>Clone Voice</h2>
        </div>

        <div class="input-group">
          <label for="voiceName">Voice Name</label>
          <input type="text" id="voiceName" placeholder="e.g., My Studio Voice" />
        </div>

        <div class="record-section">
          <div class="btn-row">
            <button id="startRecord" class="btn primary-btn"><svg xmlns="http://www.w3.org/2000/svg" width="16"
                height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
                <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                <line x1="12" x2="12" y1="19" y2="22" />
              </svg> Record</button>
            <button id="stopRecord" class="btn danger-btn" disabled><svg xmlns="http://www.w3.org/2000/svg" width="16"
                height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <rect width="18" height="18" x="3" y="3" rx="2" />
              </svg> Stop</button>
          </div>
          <div class="status-container">
            <div id="recordingIndicator" class="recording-dot hidden"></div>
            <p id="recordStatus" class="status-text">Not recording</p>
          </div>
          <audio id="recordedAudio" controls class="custom-audio hidden"></audio>
        </div>

        <div class="divider">
          <span>OR UPLOAD AUDIO</span>
        </div>

        <div class="upload-section">
          <div class="file-upload-wrapper">
            <input type="file" id="audioFile" accept="audio/*" class="file-input" />
            <div class="file-upload-display">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242" />
                <path d="M12 12v9" />
                <path d="M16 16l-4-4-4 4" />
              </svg>
              <span id="fileName">Select an audio file</span>
            </div>
          </div>
        </div>

        <button id="cloneBtn" class="btn submit-btn w-full mt-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path
              d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z" />
            <path d="M20 3v4" />
            <path d="M22 5h-4" />
            <path d="M4 17v2" />
            <path d="M5 18H3" />
          </svg>
          Clone Voice
        </button>
        <p id="cloneStatus" class="status-msg mt-2"></p>
      </section>

      <!-- Step 2 Card -->
      <section class="card">
        <div class="card-header">
          <span class="step-badge">2</span>
          <h2>Generate Speech</h2>
        </div>

        <div class="input-group">
          <label for="ttsText">Text to Speak</label>
          <textarea id="ttsText" rows="6"
            placeholder="Type the text you want your newly cloned voice to say..."></textarea>
        </div>

        <button id="generateBtn" class="btn submit-btn brand-btn w-full mt-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5" />
            <path d="M15.54 8.46a5 5 0 0 1 0 7.07" />
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14" />
          </svg>
          Generate Audio
        </button>
        <p id="generateStatus" class="status-msg mt-3"></p>

        <div class="audio-result-container mt-4">
          <audio id="generatedAudio" controls class="custom-audio w-full hidden"></audio>
        </div>
      </section>
    </div>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}?v=3"></script>
</body>

</html>
